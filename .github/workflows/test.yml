name: test
permissions:
  contents: read
on:
  push:
    branches-ignore: ['main']

jobs:
  quality:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout 🛒
        uses: actions/checkout@v6

      - name: node 22 ❇️
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: install ♦️
        run: npm ci

      - name: format check 🎨
        run: npx prettier --check vite.config.ts src

      - name: lint 🧹
        run: npm run lint

      - name: test 🧪
        run: npm test

      - name: build 🏗️
        run: npm run build
