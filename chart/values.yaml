image:
  # -- image repository
  repository: ghcr.io/arlintdev/trivyglass
  # -- image tag
  tag: "latest"
  # -- pull policy
  pullPolicy: Always
  ## Optionally specify an array of imagePullSecrets.
  ## Secrets must be manually created in the namespace.
  ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
  ## Example:
  ## pullSecrets:
  ##   - name: myRegistryKeySecretName
  # -- pull secrets
  pullSecrets: []

# -- Redis configuration
redis:
  # -- Redis image configuration
  image:
    # -- Redis image repository
    repository: redis
    # -- Redis image tag
    tag: 6.2.17
  # -- Enable Redis persistence
  persistence:
    # -- Enable Redis persistence
    enabled: false
    # -- Storage size for Redis data
    size: 1Gi
    # -- Storage class for Redis PVC
    storageClass: ""
  # -- Redis resource requirements
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# -- Additional labels to add to all resources
labels: {}

# -- Application settings
settings:
  # -- Cluster name
  cluster: "yourcluster"
  # -- Additional environment variables for the main container
  env: []
  # Example:
  # - name: DEBUG
  #   value: "true"
  
# -- Service account configuration (required for the app to work)
serviceAccount:
  # -- Create service account (required for the app to work)
  create: true
  # -- Service account name
  name: trivy-glass
  # -- Service account annotations
  annotations: {}

# -- Manual attestation of STIG controls. When enabled, the viewer persists
# attestations (manual-pass / manual-fail / not-applicable) as ConfigMaps
# named `trivyglass-attestations-<reportName>` in the namespace below.
# Disable if this install must be read-only.
attestations:
  # -- Enable read/write of attestation ConfigMaps
  enabled: true
  # -- Namespace where attestation ConfigMaps live. Must exist before install
  # (or pass --create-namespace if that's where trivyglass itself lives).
  namespace: trivyglass-system

# -- Automated STIG scanning via kube-bench. When enabled, a CronJob runs
# kube-bench on a schedule, writes the JSON output to a ConfigMap in
# `attestations.namespace`, and the viewer merges the results into the
# compliance report under a KUBE-BENCH badge. kube-bench results override
# `Not_Reviewed` controls; real scanner results still win over kube-bench.
kubeBench:
  # -- Enable the kube-bench CronJob and result ingestion
  enabled: false
  # -- Cron schedule for the scan (default: every 6 hours)
  schedule: "0 */6 * * *"
  # -- kube-bench benchmark id. EKS STIG default; swap for `cis-1.23`,
  # `rke2-cis-1.24`, `k3s-cis-1.24`, etc. for non-EKS clusters.
  benchmark: eks-stig-kubernetes-v1r6
  # -- kube-bench image
  image:
    repository: aquasec/kube-bench
    tag: v0.10.1
    pullPolicy: IfNotPresent
  # -- kubectl image used to upsert results into the ConfigMap
  kubectlImage:
    repository: bitnami/kubectl
    tag: "1.31"
    pullPolicy: IfNotPresent
  # -- Resource limits for the Job
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  # -- ServiceAccount annotations (e.g. IRSA role arn on EKS)
  serviceAccountAnnotations: {}

# -- ConfigMap configuration
configMap:
  # -- Enable ConfigMap
  enabled: false
  # -- ConfigMap name
  name: apps-config
  # -- ConfigMap data
  data: |
    {}

# -- Deployment configuration
deployment:
  # -- Number of replicas
  replicas: 1
  # -- Pod annotations
  annotations: {}
  # -- Resource requirements for the main container
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  # -- Node selector for pod assignment
  nodeSelector: {}
  # -- Tolerations for pod assignment
  tolerations: []
  # -- Affinity for pod assignment
  affinity: {}
  # -- Security context for the pod
  podSecurityContext: {}
  # -- Security context for the main container
  securityContext: {}

# -- Service configuration
service:
  # -- Service type
  type: ClusterIP
  # -- Service port
  port: 3000
  # -- Node port (when service type is NodePort)
  nodePort: null
  # -- Service annotations
  annotations: {}