name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  install:
    name: Install Dependencies
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache node_modules
        uses: actions/cache/save@v4
        with:
          path: node_modules
          key: node-modules-${{ github.sha }}

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    needs: install
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Sync SvelteKit
        run: npx svelte-kit sync

      - name: ESLint + svelte-check
        run: npx eslint vite.config.ts src && npx svelte-check --tsconfig ./tsconfig.json

  format:
    name: Format Check
    runs-on: ubuntu-24.04
    needs: install
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Prettier check
        run: npx prettier --check vite.config.ts src

  test:
    name: Test
    runs-on: ubuntu-24.04
    needs: install
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Sync SvelteKit
        run: npx svelte-kit sync

      - name: Run unit tests
        run: npm test

  build:
    name: Build
    runs-on: ubuntu-24.04
    needs: [lint, format, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-${{ github.sha }}
          fail-on-cache-miss: true

      - name: Sync SvelteKit
        run: npx svelte-kit sync

      - name: Build app
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: build/
          retention-days: 1

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Get short SHA
        id: short_sha
        run: echo "SHA_SHORT=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push amd64 image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository }}:latest-amd64
            ghcr.io/${{ github.repository }}:${{ github.ref_type == 'tag' && github.ref_name || steps.short_sha.outputs.SHA_SHORT }}-amd64
          platforms: linux/amd64

      - name: Build and push arm64 image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository }}:latest-arm64
            ghcr.io/${{ github.repository }}:${{ github.ref_type == 'tag' && github.ref_name || steps.short_sha.outputs.SHA_SHORT }}-arm64
          platforms: linux/arm64/v8

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.ref_type == 'tag' && github.ref_name || steps.short_sha.outputs.SHA_SHORT }}
          platforms: linux/amd64,linux/arm64/v8
