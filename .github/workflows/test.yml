name: test
permissions:
  contents: read
on:
  push:
    branches-ignore: ['main']

jobs:
  install:
    name: Install Dependencies
    runs-on: ubuntu-24.04
    steps:
      - name: checkout 🛒
        uses: actions/checkout@v6

      - name: node 22 ❇️
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: install ♦️
        run: npm ci

      - name: cache node_modules 📦
        uses: actions/cache/save@v4
        with:
          path: node_modules
          key: node-modules-${{ github.sha }}

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    needs: install
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-${{ github.sha }}
          fail-on-cache-miss: true
      - name: sync svelte-kit 🔄
        run: npx svelte-kit sync
      - name: ESLint + svelte-check 🧹
        run: npx eslint vite.config.ts src && npx svelte-check --tsconfig ./tsconfig.json

  format:
    name: Format Check
    runs-on: ubuntu-24.04
    needs: install
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-${{ github.sha }}
          fail-on-cache-miss: true
      - name: Prettier check 🎨
        run: npx prettier --check vite.config.ts src

  test:
    name: Test
    runs-on: ubuntu-24.04
    needs: install
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-${{ github.sha }}
          fail-on-cache-miss: true
      - name: sync svelte-kit 🔄
        run: npx svelte-kit sync
      - name: Run unit tests 🧪
        run: npm test

  build:
    name: Build
    runs-on: ubuntu-24.04
    needs: [lint, format, test]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: node-modules-${{ github.sha }}
          fail-on-cache-miss: true
      - name: sync svelte-kit 🔄
        run: npx svelte-kit sync
      - name: Build app 🏗️
        run: npm run build
